<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Circuito CHI-03 Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@100..1000&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f7f9ff", "background": "#f7f9ff", "primary": "#005bbf",
                        "primary-container": "#dbeafe", "on-primary": "#ffffff",
                        "secondary": "#006e2c", "secondary-container": "#86f898",
                        "tertiary": "#795900", "tertiary-container": "#fbbf24",
                        "error": "#ba1a1a", "surface-container": "#ebeef4",
                        "surface-container-low": "#f1f4fa", "surface-container-lowest": "#ffffff",
                        "outline": "#727785", "on-surface-variant": "#414754"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Roboto Flex', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #c1c6d6; border-radius: 10px; }
        #snackbar { visibility: hidden; min-width: 280px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 90px; transform: translateX(-50%); }
        #snackbar.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 2.5s forwards; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 90px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 90px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .tab-active { border-bottom: 3px solid #005bbf; color: #005bbf; font-weight: 700; background-color: rgba(0, 91, 191, 0.05); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
        .bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.5s ease; position: relative; }
        .bar:hover::after { content: attr(data-value); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; background: #333; color: white; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-circle { transition: stroke-dashoffset 0.5s ease; }
        .stat-card { transition: all 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .collapsible-content.open { max-height: 2000px; }
        .shepherd-icon { width: 32px; height: 32px; object-fit: contain; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col transition-colors duration-300">
    <header class="bg-surface sticky top-0 z-50 border-b border-outline/30 flex items-center justify-between px-4 w-full h-16 backdrop-blur-lg bg-opacity-90">
        <div class="flex items-center gap-2">
            <button onclick="navTo('Dashboard')" class="p-2 rounded-full hover:bg-surface-container transition-colors">
                <span class="material-symbols-outlined text-primary">menu</span>
            </button>
            <h1 class="font-bold text-xl text-primary tracking-tight">CHI-03 Admin</h1>
        </div>
        <div class="flex items-center gap-1">
            <button id="themeToggle" class="p-2 rounded-full hover:bg-surface-container transition-colors">
                <span class="material-symbols-outlined text-on-surface-variant">dark_mode</span>
            </button>
            <button onclick="navTo('Settings')" class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
                <span id="header-initial" class="font-bold text-on-secondary-container text-lg">S</span>
            </button>
        </div>
    </header>
    <main class="flex-1 pb-24 pt-4 px-4 max-w-[1280px] mx-auto w-full" id="app-canvas">
        <section id="section-Dashboard" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-2xl">Dashboard Circuito</h2>
                <button onclick="generateCircuitReport()" class="flex items-center gap-2 bg-tertiary text-on-primary py-2 px-4 rounded-full text-sm font-bold shadow-md hover:scale-105 transition-transform">
                    <span class="material-symbols-outlined text-sm">picture_as_pdf</span> Informe PDF
                </button>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="dashboard-stats"></div>
            <div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline/20">
                <h3 class="font-bold mb-3 text-on-surface-variant">Acciones Rápidas</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="navTo('ManageCongregations')" class="flex flex-col items-center gap-2 p-4 bg-surface-container-low rounded-xl hover:bg-surface-container transition-colors">
                        <span class="material-symbols-outlined text-primary text-3xl">domain_add</span>
                        <span class="text-sm font-medium">Gestionar Congregaciones</span>
                    </button>
                    <label class="flex flex-col items-center gap-2 p-4 bg-surface-container-low rounded-xl hover:bg-surface-container transition-colors cursor-pointer">
                        <span class="material-symbols-outlined text-secondary text-3xl">upload_file</span>
                        <span class="text-sm font-medium">Importar Excel Circuito</span>
                        <input type="file" class="hidden" accept=".xlsx, .xls" onchange="handleExcelCircuit(event)"/>
                    </label>
                </div>
            </div>
            <div class="space-y-3 pt-2">
                <h3 class="font-bold text-on-surface-variant pl-1">Congregaciones</h3>
                <div id="dashboard-cong-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </section>
        <section id="section-ManageCongregations" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <button onclick="navTo('Dashboard')" class="flex items-center gap-1 text-on-surface-variant">
                    <span class="material-symbols-outlined">arrow_back</span> Volver
                </button>
                <h2 class="font-bold text-xl">Gestión de Congregaciones</h2>
                <div class="w-10"></div>
            </div>
            <div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-dashed border-primary">
                <h3 class="font-bold mb-3">Añadir Nueva Congregación</h3>
                <div class="flex gap-2">
                    <input id="new-cong-name" type="text" placeholder="Nombre (ej. Omega)" class="flex-1 bg-surface border border-outline-variant rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-primary"/>
                    <select id="new-cong-circuit" class="bg-surface border border-outline-variant rounded-lg px-3 py-2 outline-none">
                        <option value="CHI-03-A">CHI-03-A</option>
                        <option value="CHI-03-B">CHI-03-B</option>
                    </select>
                    <button onclick="addNewCongregation()" class="bg-primary text-on-primary px-4 rounded-lg font-bold hover:opacity-90">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>
            <div id="manage-list" class="space-y-3"></div>
        </section>
        <section id="section-Detail" class="hidden space-y-4">
            <div class="flex items-center gap-3">
                <button onclick="navTo('Dashboard')" class="p-2 rounded-full hover:bg-surface-container">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div>
                    <h2 id="detail-name" class="font-bold text-xl truncate"></h2>
                    <span id="detail-badge" class="text-xs font-bold px-2 py-0.5 rounded bg-secondary-container text-on-secondary-container"></span>
                </div>
            </div>
            <div class="sticky top-16 z-40 bg-surface border-b border-outline-variant">
                <nav class="flex overflow-x-auto -mx-4 px-4" id="detail-tabs">
                    <button onclick="switchTab('publishers')" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent tab-active">Publicadores (S-21)</button>
                    <button onclick="switchTab('stats')" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent">Estadísticas Excel</button>
                </nav>
            </div>
            <div id="detail-content"></div>
        </section>
        <section id="section-Settings" class="hidden space-y-6">
            <h2 class="font-bold text-2xl">Ajustes</h2>
            <div class="bg-surface-container-lowest rounded-xl p-4 border border-outline-variant">
                <h3 class="font-bold text-error mb-2">Mantenimiento</h3>
                <button onclick="clearAllData()" class="flex items-center gap-2 text-error font-semibold hover:bg-error-container/20 p-2 rounded-lg w-full justify-center border border-error/30">
                    <span class="material-symbols-outlined">delete_forever</span> Borrar Todo y Restablecer
                </button>
            </div>
        </section>
    </main>
    <nav class="fixed bottom-0 w-full z-50 bg-surface/90 backdrop-blur-lg border-t border-outline-variant/50 flex justify-around items-center h-20">
        <button onclick="navTo('Dashboard')" class="flex flex-col items-center justify-center text-primary p-2">
            <span class="material-symbols-outlined text-3xl">dashboard</span>
            <span class="text-xs font-bold mt-1">Inicio</span>
        </button>
        <button onclick="navTo('ManageCongregations')" class="flex flex-col items-center justify-center text-on-surface-variant p-2">
            <span class="material-symbols-outlined text-3xl">location_city</span>
            <span class="text-xs font-medium mt-1">Gestionar</span>
        </button>
        <button onclick="navTo('Settings')" class="flex flex-col items-center justify-center text-on-surface-variant p-2">
            <span class="material-symbols-outlined text-3xl">settings</span>
            <span class="text-xs font-medium mt-1">Ajustes</span>
        </button>
    </nav>
    <div id="snackbar">Mensaje</div>

        function init() {
            const saved = localStorage.getItem('CHI03_PRO_APP_FINAL');
            if (saved) {
                try { state = JSON.parse(saved); } catch(e) {}
            } else {
                defaultList.forEach(c => {
                    state.congregations.push({
                        id: genId(), name: c.name, circuit: c.circuit,
                        publishers: [], stats: null
                    });
                });
                save();
            }
            if (state.isDark) document.documentElement.classList.add('dark');
            renderDashboard();
            renderManageList();
        }
        function save() { localStorage.setItem('CHI03_PRO_APP_FINAL', JSON.stringify(state)); }
        function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        function navTo(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id)?.classList.remove('hidden');
            window.scrollTo(0,0);
        }
        function addNewCongregation() {
            const nameInput = document.getElementById('new-cong-name');
            const circuitSelect = document.getElementById('new-cong-circuit');
            if (!nameInput.value.trim()) return showSnackbar("Escribe un nombre");
            state.congregations.push({
                id: genId(), name: nameInput.value.trim(), circuit: circuitSelect.value,
                publishers: [], stats: null
            });
            save();
            nameInput.value = '';
            renderManageList();
            renderDashboard();
            showSnackbar("Congregación añadida");
        }
        function deleteCongregation(id) {
            if(!confirm("¿Eliminar esta congregación y todos sus datos?")) return;
            state.congregations = state.congregations.filter(c => c.id !== id);
            save();
            renderManageList();
            renderDashboard();
            showSnackbar("Eliminada");
        }
        function renderManageList() {
            const container = document.getElementById('manage-list');
            container.innerHTML = state.congregations.map(c => `
                <div class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant flex justify-between items-center shadow-sm">
                    <div>
                        <h3 class="font-bold">${c.name}</h3>
                        <span class="text-xs font-semibold px-2 py-0.5 rounded ${c.circuit.includes('A') ? 'bg-secondary-container text-on-secondary-container' : 'bg-tertiary-container text-on-tertiary-container'}">${c.circuit}</span>
                        ${c.stats ? '<span class="text-xs text-primary font-semibold ml-2">📊 Stats cargadas</span>' : ''}
                    </div>
                    <button onclick="deleteCongregation('${c.id}')" class="p-2 text-error hover:bg-error-container/20 rounded-full">
                        <span class="material-symbols-outlined">delete_forever</span>
                    </button>
                </div>
            `).join('');
        }
        function renderDashboard() {
            let totalPubs = 0, totalPr = 0, totalAncianos = 0, congsWithStats = 0;
            state.congregations.forEach(c => {
                if (c.stats) congsWithStats++;
                c.publishers.forEach(p => {
                    if (p.appointment === 'Anciano' || p.appointment === 'Siervo Ministerial') totalAncianos++;
                    if (p.appointment.includes('Precursor')) totalPr++;
                    if (p.history.length > 0) totalPubs++;
                });
            });
            document.getElementById('dashboard-stats').innerHTML = `
                <div class="bg-surface-container-lowest p-4 rounded-xl border flex flex-col justify-center items-center min-h-[100px]">
                    <span class="material-symbols-outlined text-primary">groups</span>
                    <span class="text-2xl font-bold">${state.congregations.length}</span>
                    <span class="text-xs text-on-surface-variant">Congregaciones</span>
                </div>
                <div class="bg-surface-container-lowest p-4 rounded-xl border flex flex-col justify-center items-center min-h-[100px]">
                    <span class="material-symbols-outlined text-secondary">person</span>
                    <span class="text-2xl font-bold">${totalPubs}</span>
                    <span class="text-xs text-on-surface-variant">Publicadores Activos</span>
                </div>
                <div class="bg-surface-container-lowest p-4 rounded-xl border flex flex-col justify-center items-center min-h-[100px]">

        async function handleS21Upload(event) {
            const files = event.target.files;

            showSnackbar(`Procesando ${files.length} archivo(s)...`);

        function extractTextFromPdf(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                        let text = "";
                        for(let i=1; i<=pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(s => s.str).join(" ") + "\n";
                        }
                        resolve(text);
                    } catch(err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        }
        function parseS21Data(text, filename) {
            const nameMatch = text.match(/(?:Nombre|Name)\s*[:\-]?\s*([A-ZÁÉÍÓÚÑa-záéíóúñ]+\s+[A-ZÁÉÍÓÚÑa-záéíóúñ]+(?:\s+[A-ZÁÉÍÓÚÑa-záéíóúñ]+)?)/);
            let name = nameMatch ? nameMatch[1] : filename.replace('.pdf', '').replace(/_/g, ' ');
            const t = text.toUpperCase();
            let appointment = "Publicador";
            if (t.includes("ANCIANO")) appointment = "Anciano";
            else if (t.includes("MINISTERIAL")) appointment = "Siervo Ministerial";
            else if (t.includes("PRECURSOR REGULAR")) appointment = "Precursor Regular";
            const months = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","SEPT","OCT","NOV","DIC"];
            const history = [];
            const tokens = text.split(/\s+/);
            let foundMonths = [];
            tokens.forEach((token, index) => {
                const clean = token.toUpperCase().replace(/[.,]/g, '');
                if (months.includes(clean)) foundMonths.push({ month: clean, index: index });
            });
            foundMonths.forEach(m => {
                for(let i = m.index + 1; i < m.index + 6; i++) {
                    if (tokens[i]) {
                        const val = parseInt(tokens[i].replace(':', ''));
                        if (!isNaN(val) && val > 0) {
                            let type = "Publicador";
                            const windowText = tokens.slice(m.index, i+3).join(" ").toUpperCase();
                            if (windowText.includes("AUX") || windowText.includes("AUXILIAR")) type = "Precursor Auxiliar";
                            else if (appointment.includes("Precursor Regular")) type = "Precursor Regular";
                            history.push({ month: m.month, hours: val, type: type });
                            break;
                        }
                    }
                }
            });
            const uniqueHistory = [];
            const seen = new Set();
            history.forEach(h => { if(!seen.has(h.month)) { seen.add(h.month); uniqueHistory.push(h); }});
            return { id: genId(), name: name.trim(), appointment: appointment, history: uniqueHistory };
        }

        }        function parseVisitaExcel(workbook) {

            sb.className = "show";
            setTimeout(() => sb.className = "", 3000);
        }
        function clearAllData() {
            if(confirm("¿Borrar todos los datos y restaurar lista original?")) {
                localStorage.removeItem('CHI03_PRO_APP_FINAL');
                location.reload();
            }
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            state.isDark = !state.isDark;
            document.documentElement.classList.toggle('dark');
            document.querySelector('#themeToggle .material-symbols-outlined').innerText = state.isDark ? 'light_mode' : 'dark_mode';
            save();
        });
        init();
        window.navTo = navTo;
        window.openCongregation = openCongregation;
        window.switchTab = switchTab;
        window.handleS21Upload = handleS21Upload;
        window.addNewCongregation = addNewCongregation;
        window.deleteCongregation = deleteCongregation;
        window.deletePublisher = deletePublisher;
        window.generateCircuitReport = generateCircuitReport;
        window.handleExcelCircuit = handleExcelCircuit;
        window.clearAllData = clearAllData;
        window.deleteStats = deleteStats;
        window.toggleCollapse = toggleCollapse;
    </script>
</body>
</html>
